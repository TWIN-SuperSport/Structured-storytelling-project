<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reverse-plot-tool</title>
  <style>
    :root {
      --bg: #f2ede4;
      --paper: #fffaf2;
      --ink: #1d1a16;
      --muted: #6c6256;
      --line: #d8c8b1;
      --accent: #8f4d2e;
      --accent-2: #c98f54;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(201,143,84,0.22), transparent 38%),
        linear-gradient(180deg, #f6f1e8, var(--bg));
      color: var(--ink);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: 0.04em;
    }
    .lead {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.8;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .panel {
      background: rgba(255,250,242,0.88);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(61, 40, 18, 0.08);
    }
    label {
      display: block;
      margin: 0 0 8px;
      font-size: 0.95rem;
    }
    textarea, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      background: #fffdfa;
      color: var(--ink);
    }
    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.7;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    button {
      margin-top: 14px;
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font: inherit;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      cursor: pointer;
    }
    button[disabled] {
      opacity: 0.72;
      cursor: wait;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.9rem;
    }
    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .field-stack {
      margin-top: 12px;
    }
    .status {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      line-height: 1.7;
      color: var(--muted);
    }
    .status strong {
      color: var(--ink);
    }
    .status.is-busy {
      border-color: rgba(201,143,84,0.65);
      background: rgba(201,143,84,0.12);
      color: #6b4026;
    }
    .status.is-error {
      border-color: rgba(143,77,46,0.45);
      background: rgba(143,77,46,0.10);
      color: #6b2f1c;
    }
    .status.is-success {
      border-color: rgba(110,136,96,0.45);
      background: rgba(110,136,96,0.12);
      color: #35502f;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .secondary-btn {
      background: #efe0cc;
      color: var(--accent);
      border: 1px solid rgba(143,77,46,0.18);
    }
    .choice-card {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
    }
    .choice-card h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }
    .choice-card p {
      margin: 0;
      line-height: 1.8;
      color: var(--ink);
    }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(22, 17, 12, 0.48);
      z-index: 20;
    }
    .modal.is-open {
      display: flex;
    }
    .modal-panel {
      width: min(760px, 100%);
      max-height: min(78vh, 760px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 18px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(35, 23, 12, 0.24);
    }
    .modal-head, .modal-foot {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }
    .modal-foot {
      border-top: 1px solid var(--line);
      border-bottom: none;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-body {
      padding: 14px 18px 18px;
      overflow: auto;
    }
    .choice-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px solid rgba(216,200,177,0.72);
    }
    .choice-option:last-child {
      border-bottom: none;
    }
    .choice-option input {
      width: auto;
      margin-top: 4px;
    }
    .choice-option-text {
      line-height: 1.8;
      white-space: pre-wrap;
    }
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      background: #fffdfa;
      color: var(--ink);
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>reverse-plot-tool</h1>
    <p class="lead">結末や終着条件から、物語の前提・欠落・関係変化・転換点を遡上して構造化するための検証サービス。</p>
    <div class="grid">
      <section class="panel">
        <label for="ending_text">終着条件 / 結末</label>
        <textarea id="ending_text">現代日本から異世界に転生した高校生の男子が、異世界で魔法使いとして成長し、魔王を討伐したあと、日本に再転生して終わる。</textarea>
        <div class="row">
          <div>
            <label for="genre_hint">ジャンルヒント</label>
            <input id="genre_hint" value="異世界転生ファンタジー">
          </div>
          <div>
            <label for="protagonist_hint">主人公ヒント</label>
            <input id="protagonist_hint" value="男子高校生">
          </div>
        </div>
        <div class="field-stack">
          <label for="wild_twist_level">突拍子レベル</label>
          <select id="wild_twist_level">
            <option value="0" selected>0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
          <p class="hint">0 は堅実、10 は「転」で物語の見え方がひっくり返る級。ただし因果と結末整合は守る。</p>
        </div>
        <div class="actions">
          <button id="run-btn" type="button">物語構造を遡上する</button>
          <button id="epilogue-btn" class="secondary-btn" type="button">epilogue 候補を選ぶ</button>
        </div>
      </section>
      <section class="panel">
        <p class="hint">いまは JSON をそのまま表示する。最終的にはこの正本から `.md` のプロットを起こす想定。</p>
        <div id="status-box" class="status">まだ送信してないよ。終着条件を整えたら、下の JSON 欄に結果が出る。</div>
        <section class="choice-card">
          <h2>確定した epilogue</h2>
          <p id="selected-epilogue">まだ未選択。`epilogue 候補を選ぶ` から候補を出せる。</p>
        </section>
        <pre id="output">ここに結果が出る。</pre>
      </section>
    </div>
  </div>
  <div id="epilogue-modal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-head">
        <strong>epilogue 候補を選ぶ</strong><br>
        <span class="hint">候補を1つ選んで確定すると、右側に保持される。</span>
      </div>
      <div id="epilogue-choices" class="modal-body"></div>
      <div class="modal-foot">
        <button id="epilogue-cancel-btn" class="secondary-btn" type="button">閉じる</button>
        <button id="epilogue-confirm-btn" type="button">この候補で確定</button>
      </div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('run-btn');
    const epilogueBtn = document.getElementById('epilogue-btn');
    const output = document.getElementById('output');
    const statusBox = document.getElementById('status-box');
    const selectedEpilogue = document.getElementById('selected-epilogue');
    const epilogueModal = document.getElementById('epilogue-modal');
    const epilogueChoices = document.getElementById('epilogue-choices');
    const epilogueConfirmBtn = document.getElementById('epilogue-confirm-btn');
    const epilogueCancelBtn = document.getElementById('epilogue-cancel-btn');

    let waitingTimer = null;
    let currentEpilogueChoices = [];

    function setStatus(message, mode = '') {
      statusBox.className = `status${mode ? ` is-${mode}` : ''}`;
      statusBox.innerHTML = message;
    }

    function clearWaitingTimer() {
      if (waitingTimer !== null) {
        clearInterval(waitingTimer);
        waitingTimer = null;
      }
    }

    function setButtonsDisabled(disabled) {
      btn.disabled = disabled;
      epilogueBtn.disabled = disabled;
      btn.textContent = disabled ? '生成待ち...' : '物語構造を遡上する';
      epilogueBtn.textContent = disabled ? '候補生成待ち...' : 'epilogue 候補を選ぶ';
    }

    function closeEpilogueModal() {
      epilogueModal.classList.remove('is-open');
      epilogueModal.setAttribute('aria-hidden', 'true');
    }

    function openEpilogueModal(choices) {
      currentEpilogueChoices = choices;
      epilogueChoices.innerHTML = choices.map((choice, index) => `
        <label class="choice-option">
          <input type="radio" name="epilogue-choice" value="${choice.id}" ${index === 0 ? 'checked' : ''}>
          <span class="choice-option-text">${choice.text}</span>
        </label>
      `).join('');
      epilogueModal.classList.add('is-open');
      epilogueModal.setAttribute('aria-hidden', 'false');
    }

    function startWaitingStatus() {
      const startedAt = Date.now();
      const render = () => {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        let phase = 'リレーに依頼を投げて、生成結果を待ってる。';
        if (elapsed >= 15) {
          phase = 'Swallow が長めに考えてる。重い生成だとこのくらい待つことがある。';
        }
        if (elapsed >= 45) {
          phase = 'まだ処理中。固まってるわけじゃなく、重めの候補生成が続いてる。';
        }
        if (elapsed >= 90) {
          phase = 'かなり長考中。結果が返るまでこのまま待ってて大丈夫。';
        }
        setStatus(`<strong>送信済み</strong><br>${phase}<br>経過 ${elapsed} 秒`, 'busy');
      };
      render();
      waitingTimer = setInterval(render, 1000);
    }

    btn.addEventListener('click', async () => {
      clearWaitingTimer();
      setButtonsDisabled(true);
      output.textContent = 'JSON の返却待ち...';
      startWaitingStatus();
      try {
        const res = await fetch('/api/story/reverse-plot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ending_text: document.getElementById('ending_text').value,
            genre_hint: document.getElementById('genre_hint').value,
            protagonist_hint: document.getElementById('protagonist_hint').value,
            wild_twist_level: Number(document.getElementById('wild_twist_level').value)
          })
        });
        const raw = await res.text();
        let data = null;
        try {
          data = JSON.parse(raw);
        } catch (parseError) {
          clearWaitingTimer();
          setButtonsDisabled(false);
          if (!res.ok) {
            setStatus(`<strong>エラー</strong><br>サーバが JSON 以外を返した。HTTP ${res.status}`, 'error');
            output.textContent = `サーバエラー: HTTP ${res.status}\n\n${raw.slice(0, 1200)}`;
            return;
          }
          setStatus('<strong>エラー</strong><br>レスポンスの JSON 解析に失敗した。', 'error');
          throw new Error(`JSON parse failed: ${parseError.message}\n\n${raw.slice(0, 400)}`);
        }
        if (!res.ok) {
          clearWaitingTimer();
          setButtonsDisabled(false);
          setStatus(`<strong>エラー</strong><br>生成は完了しなかった。HTTP ${res.status} の応答を受け取った。`, 'error');
          output.textContent = JSON.stringify({
            status: 'error',
            http_status: res.status,
            body: data
          }, null, 2);
          return;
        }
        clearWaitingTimer();
        setButtonsDisabled(false);
        setStatus('<strong>生成完了</strong><br>JSON が返ってきた。内容を下で確認して。', 'success');
        output.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        clearWaitingTimer();
        setButtonsDisabled(false);
        setStatus('<strong>通信エラー</strong><br>結果取得中に失敗した。下の内容をそのまま見れば切り分けできる。', 'error');
        output.textContent = String(e);
      }
    });

    epilogueBtn.addEventListener('click', async () => {
      clearWaitingTimer();
      setButtonsDisabled(true);
      output.textContent = 'epilogue 候補の返却待ち...';
      setStatus('<strong>送信済み</strong><br>epilogue 候補をまとめて生成してる。', 'busy');
      try {
        const res = await fetch('/api/story/reverse-plot/staged/epilogue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ending_text: document.getElementById('ending_text').value,
            genre_hint: document.getElementById('genre_hint').value,
            protagonist_hint: document.getElementById('protagonist_hint').value,
            wild_twist_level: Number(document.getElementById('wild_twist_level').value),
            choice_count: 3
          })
        });
        const raw = await res.text();
        let data = null;
        try {
          data = JSON.parse(raw);
        } catch (parseError) {
          setButtonsDisabled(false);
          setStatus(`<strong>エラー</strong><br>候補 API が JSON 以外を返した。HTTP ${res.status}`, 'error');
          output.textContent = `サーバエラー: HTTP ${res.status}\n\n${raw.slice(0, 1200)}`;
          return;
        }
        if (!res.ok) {
          setButtonsDisabled(false);
          setStatus(`<strong>エラー</strong><br>epilogue 候補生成に失敗した。HTTP ${res.status}`, 'error');
          output.textContent = JSON.stringify({
            status: 'error',
            http_status: res.status,
            body: data
          }, null, 2);
          return;
        }
        setButtonsDisabled(false);
        setStatus('<strong>候補生成完了</strong><br>epilogue 候補を選んで確定して。', 'success');
        output.textContent = JSON.stringify(data, null, 2);
        openEpilogueModal(data.choices || []);
      } catch (e) {
        setButtonsDisabled(false);
        setStatus('<strong>通信エラー</strong><br>epilogue 候補取得に失敗した。', 'error');
        output.textContent = String(e);
      }
    });

    epilogueConfirmBtn.addEventListener('click', () => {
      const checked = document.querySelector('input[name="epilogue-choice"]:checked');
      if (!checked) {
        setStatus('<strong>未選択</strong><br>確定する候補を1つ選んで。', 'error');
        return;
      }
      const picked = currentEpilogueChoices.find((item) => item.id === checked.value);
      if (!picked) {
        setStatus('<strong>エラー</strong><br>選択候補を解決できなかった。', 'error');
        return;
      }
      selectedEpilogue.textContent = picked.text;
      closeEpilogueModal();
      setStatus('<strong>epilogue 確定</strong><br>最初の段として epilogue を保持した。次は ten へ進む設計。', 'success');
    });

    epilogueCancelBtn.addEventListener('click', () => {
      closeEpilogueModal();
    });

    epilogueModal.addEventListener('click', (event) => {
      if (event.target === epilogueModal) {
        closeEpilogueModal();
      }
    });
  </script>
</body>
</html>
